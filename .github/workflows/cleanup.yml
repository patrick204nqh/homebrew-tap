name: Cleanup

# On PR close without merge, delete the prerelease snapshot that was
# built during CI. Scoped to its own workflow so open PRs aren't cluttered
# by an "always skipped" cleanup check.
on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  cleanup:
    name: Delete Prerelease
    if: ${{ !github.event.pull_request.merged }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/detect-formulas
        id: detect
        with:
          mode: pr
          base_ref: ${{ github.base_ref }}

      - name: Delete prerelease for abandoned PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORMULAS: ${{ steps.detect.outputs.formulas }}
        run: |
          set -euo pipefail
          # Each changed formula has its own `{formula}-v{version}` tag in its
          # bottle block. Iterate so we clean up every per-formula prerelease
          # this PR created (not just the first one we find).
          while IFS= read -r formula; do
            tag=$(grep -oP 'root_url.*releases/download/\K[^"]+' \
              "Formula/${formula}.rb" 2>/dev/null | head -1 || true)

            if [ -z "$tag" ]; then
              echo "${formula}: no bottle block — skipping."
              continue
            fi

            if ! gh release view "$tag" &>/dev/null; then
              echo "${tag}: no release found, skipping."
              continue
            fi

            is_prerelease=$(gh release view "$tag" --json isPrerelease -q '.isPrerelease')
            if [ "$is_prerelease" = "true" ]; then
              gh release delete "$tag" --yes --cleanup-tag
              echo "Deleted prerelease $tag"
            else
              echo "$tag is already published — keeping."
            fi
          done < <(echo "$FORMULAS" | jq -r '.[]')
