name: Sync Formulas

on:
  schedule:
    # Sunday 23:00 UTC — captures end-of-week state before Monday's update check.
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  detect:
    name: Detect Updates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      updates: ${{ steps.check.outputs.updates }}
    steps:
      - uses: actions/checkout@v4

      - name: Collect formula targets
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          entries=()

          for formula in Formula/*.rb; do
            formula_name=$(basename "$formula" .rb)
            echo "Checking $formula_name..."

            current_version=$(grep -oP '(?:archive/refs/tags/v|releases/download/v)\K[0-9]+\.[0-9]+\.[0-9]+' "$formula" | head -1)
            if [ -z "$current_version" ]; then
              current_version=$(grep -oP '^\s+version\s+"\K[^"]+' "$formula" | head -1)
            fi

            repo_url=$(grep -oP '(?<=github\.com/)[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+' "$formula" | head -1)

            if [ -z "$current_version" ] || [ -z "$repo_url" ]; then
              echo "  Could not extract version or repo, skipping."
              continue
            fi

            latest_release=$(curl -sf -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$repo_url/releases/latest" || true)
            latest_version=$(echo "$latest_release" | jq -r '.tag_name // empty' | sed 's/^v//')

            if [ "$latest_version" = "null" ] || [ -z "$latest_version" ]; then
              echo "  No upstream release found, skipping."
              continue
            fi

            echo "  current=$current_version  latest=$latest_version"

            if [ "$current_version" = "$latest_version" ]; then
              echo "  Up to date, skipping."
              continue
            fi

            entry=$(jq -n \
              --arg name "$formula_name" \
              --arg repo "$repo_url" \
              --arg current "$current_version" \
              --arg latest "$latest_version" \
              '{name: $name, repo: $repo, current: $current, latest: $latest}')
            entries+=("$entry")
            echo "  Queued."
          done

          updates=$(printf '%s\n' "${entries[@]+"${entries[@]}"}" | jq -sc .)
          {
            echo "updates<<EOF"
            echo "$updates"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Total queued: $(echo "$updates" | jq length)"

  open-pr:
    name: Open Update PR
    needs: detect
    if: needs.detect.outputs.updates != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Update formula versions and SHA256s
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATES: ${{ needs.detect.outputs.updates }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          branch="sync/formula-updates-$(date -u +%Y-%m-%d)"
          git checkout -B "$branch"

          while IFS= read -r entry; do
            name=$(echo "$entry" | jq -r '.name')
            current=$(echo "$entry" | jq -r '.current')
            latest=$(echo "$entry" | jq -r '.latest')

            if [ "$current" = "$latest" ]; then
              echo "$name: already at $latest, skipping."
              continue
            fi

            current_url=$(grep -oP 'url\s+"\K[^"]+' "Formula/${name}.rb" | head -1)
            current_version_in_url=$(echo "$current_url" | grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            tarball_url=$(echo "$current_url" | sed "s/${current_version_in_url}/${latest}/g")

            if [ -z "$tarball_url" ]; then
              echo "ERROR: could not derive tarball URL for $name"
              exit 1
            fi

            echo "Downloading: $tarball_url"
            curl -fSL "$tarball_url" -o tarball.tar.gz
            sha256=$(sha256sum tarball.tar.gz | cut -d' ' -f1)
            rm -f tarball.tar.gz

            ruby .github/scripts/update-formula.rb "Formula/${name}.rb" "$latest" "$sha256"
            echo "Updated $name: $current → $latest"

            if [ -x "script/gen-completions" ] && \
               { [ -f "completions/${name}.bash" ] || [ -f "completions/_${name}" ]; }; then
              echo "Regenerating completions for $name..."
              ruby script/gen-completions "$latest" || true
            fi
          done < <(echo "$UPDATES" | jq -c '.[]')

          git add Formula/ completions/
          if git diff --cached --quiet; then
            echo "No formula changes to commit."
            exit 0
          fi

          summary=$(echo "$UPDATES" | jq -r \
            '.[] | select(.current != .latest) | "- `\(.name)`: \(.current) → \(.latest)"')

          git commit -m "chore: sync formula versions"
          git push --force-with-lease origin "$branch"

          existing=$(gh pr list --head "$branch" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "PR #${existing} already open for ${branch} — branch updated."
          else
            gh pr create \
              --title "chore: sync formula versions $(date -u +%Y-%m-%d)" \
              --body "$(printf 'Automated weekly formula version sync.\n\n## Updates\n\n%s\n\nCI will build and verify bottles before this PR can be merged.' "$summary")" \
              --base main \
              --head "$branch" \
              --label "formula-update"
          fi
