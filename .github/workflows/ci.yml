name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Run RuboCop
        run: bundle exec rubocop

  audit:
    name: Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
      - name: Audit and style-check formulas
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/patrick204nqh"
          ln -sfn "$GITHUB_WORKSPACE" "$(brew --repository)/Library/Taps/patrick204nqh/homebrew-tap"
          for formula in Formula/*.rb; do
            name=$(basename "$formula" .rb)
            echo "--- $name ---"
            brew audit --strict "patrick204nqh/tap/$name"
            brew style "patrick204nqh/tap/$name"
          done

  detect-formulas:
    name: Detect Formulas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      formulas: ${{ steps.detect.outputs.formulas }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect changed formulas
        id: detect
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD \
            | grep '^Formula/.*\.rb$' \
            | xargs -I{} basename {} .rb \
            | jq -R . | jq -sc .)
          # On workflow_dispatch or no changes, fall back to all formulas
          if [ "$changed" = "[]" ] || [ "$changed" = "null" ]; then
            changed=$(ls Formula/*.rb | xargs -I{} basename {} .rb | jq -R . | jq -sc .)
            echo "No formula changes detected, falling back to all formulas"
          fi
          echo "formulas=$changed" >> $GITHUB_OUTPUT
          echo "Formulas to build: $changed"

  build-and-publish:
    name: Build and Publish
    needs: [lint, audit, detect-formulas]
    # Skip bot commits — snapshot.yml owns the automated update+build path.
    # [skip ci] in bot commit messages already prevents this from firing,
    # but the actor check is an explicit guard for clarity.
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-latest
    timeout-minutes: 30
    concurrency:
      group: bottle-publish-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        formula: ${{ fromJson(needs.detect-formulas.outputs.formulas) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Tap local repo
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/patrick204nqh"
          ln -sfn "$GITHUB_WORKSPACE" "$(brew --repository)/Library/Taps/patrick204nqh/homebrew-tap"

      - name: Install and test
        run: |
          brew install --build-bottle "patrick204nqh/tap/${{ matrix.formula }}"
          brew test "patrick204nqh/tap/${{ matrix.formula }}"

      - name: Build bottle
        run: |
          version=$(brew info --json "patrick204nqh/tap/${{ matrix.formula }}" | jq -r '.[0].versions.stable')
          echo "VERSION=$version" >> $GITHUB_ENV
          brew bottle --json \
            --root-url "https://github.com/patrick204nqh/homebrew-tap/releases/download/${{ matrix.formula }}-${version}" \
            "patrick204nqh/tap/${{ matrix.formula }}"

      - name: Merge bottle and commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git pull --rebase origin main
          brew bottle --merge --write --no-commit *.bottle*.json

          rebuild=$(grep -E '^\s+rebuild [0-9]+' "Formula/${{ matrix.formula }}.rb" | grep -oE '[0-9]+' || echo "0")
          old_bottle=$(ls *.bottle*.tar.gz | head -1)
          os=$(echo "$old_bottle" | sed -E 's/.*\.([^.]+)\.bottle.*/\1/')
          if [ "$rebuild" = "0" ]; then
            new_bottle="${{ matrix.formula }}-${{ env.VERSION }}.${os}.bottle.tar.gz"
          else
            new_bottle="${{ matrix.formula }}-${{ env.VERSION }}.${os}.bottle.${rebuild}.tar.gz"
          fi
          [ "$old_bottle" != "$new_bottle" ] && mv "$old_bottle" "$new_bottle"
          echo "BOTTLE_FILE=$new_bottle" >> $GITHUB_ENV

          git add "Formula/${{ matrix.formula }}.rb"
          if ! git diff --cached --quiet; then
            git commit -m "bottles: ${{ matrix.formula }} v${{ env.VERSION }} [skip ci]"
            pushed=false
            for i in 1 2 3; do
              if git pull --rebase origin main && git push origin HEAD:main; then
                pushed=true
                break
              fi
              sleep $((RANDOM % 10 + 5))
            done
            $pushed || { echo "ERROR: failed to push after 3 attempts"; exit 1; }
          fi

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ matrix.formula }}-${{ env.VERSION }}"
          if ! gh release view "$tag" &>/dev/null; then
            gh release create "$tag" \
              --title "${{ matrix.formula }} v${{ env.VERSION }}" \
              --notes "Pre-built bottles for \`${{ matrix.formula }}\` v${{ env.VERSION }}"
          fi
          gh release view "$tag" --json assets --jq '.assets[].name' \
            | grep '\.bottle' \
            | grep -v "^${{ env.BOTTLE_FILE }}$" \
            | xargs -I{} gh release delete-asset "$tag" {} --yes || true
          gh release upload "$tag" "${{ env.BOTTLE_FILE }}" --clobber

      - name: Delete stale releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current_tag="${{ matrix.formula }}-${{ env.VERSION }}"
          gh release list --limit 100 --json tagName \
            | jq -r '.[].tagName' \
            | grep "^${{ matrix.formula }}-" \
            | grep -v "^${current_tag}$" \
            | grep -v "^tap-" \
            | xargs -I{} sh -c 'gh release delete "$1" --yes --cleanup-tag || true' _ {}
