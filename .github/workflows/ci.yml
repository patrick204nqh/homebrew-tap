name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Run RuboCop
        run: bundle exec rubocop

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
      - name: Audit and style-check formulas
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/patrick204nqh"
          ln -sfn "$GITHUB_WORKSPACE" "$(brew --repository)/Library/Taps/patrick204nqh/homebrew-tap"
          for formula in Formula/*.rb; do
            name=$(basename "$formula" .rb)
            echo "--- $name ---"
            brew audit --strict "patrick204nqh/tap/$name"
            brew style "patrick204nqh/tap/$name"
          done

  get-formulas:
    runs-on: ubuntu-latest
    outputs:
      formulas: ${{ steps.list.outputs.formulas }}
    steps:
      - uses: actions/checkout@v4
      - name: List formulas
        id: list
        run: |
          formulas=$(ls Formula/*.rb | xargs -I{} basename {} .rb | jq -R . | jq -sc .)
          echo "formulas=$formulas" >> $GITHUB_OUTPUT

  build-and-publish:
    needs: [lint, audit, get-formulas]
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        formula: ${{ fromJson(needs.get-formulas.outputs.formulas) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Tap local repo
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/patrick204nqh"
          ln -sfn "$GITHUB_WORKSPACE" "$(brew --repository)/Library/Taps/patrick204nqh/homebrew-tap"

      - name: Install and test
        run: |
          brew install --build-bottle "patrick204nqh/tap/${{ matrix.formula }}"
          brew test "patrick204nqh/tap/${{ matrix.formula }}"

      - name: Build bottle
        run: |
          version=$(brew info --json "patrick204nqh/tap/${{ matrix.formula }}" | jq -r '.[0].versions.stable')
          echo "VERSION=$version" >> $GITHUB_ENV
          brew bottle --json \
            --root-url "https://github.com/patrick204nqh/homebrew-tap/releases/download/${{ matrix.formula }}-${version}" \
            "patrick204nqh/tap/${{ matrix.formula }}"

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ matrix.formula }}-${{ env.VERSION }}"
          if ! gh release view "$tag" &>/dev/null; then
            gh release create "$tag" \
              --title "${{ matrix.formula }} v${{ env.VERSION }}" \
              --notes "Pre-built bottles for \`${{ matrix.formula }}\` v${{ env.VERSION }}"
          fi
          gh release upload "$tag" *.bottle*.tar.gz --clobber

      - name: Delete stale releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current_tag="${{ matrix.formula }}-${{ env.VERSION }}"
          gh release list --limit 100 --json tagName \
            | jq -r '.[].tagName' \
            | grep "^${{ matrix.formula }}-" \
            | grep -v "^${current_tag}$" \
            | xargs -I{} sh -c 'gh release delete "$1" --yes --cleanup-tag || true' _ {}

      - name: Merge bottle into formula and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          brew bottle --merge --write --no-commit *.bottle*.json
          git add "Formula/${{ matrix.formula }}.rb"
          if ! git diff --cached --quiet; then
            git commit -m "bottles: ${{ matrix.formula }} v${{ env.VERSION }} [skip ci]"
            git push origin HEAD:main
          fi
