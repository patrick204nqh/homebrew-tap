name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

env:
  TAP: patrick204nqh/tap

jobs:
  validate:
    name: Validate
    if: github.event.action != 'closed'
    uses: ./.github/workflows/validate-formulas.yml
    with:
      mode: pr
      base_ref: ${{ github.base_ref }}

  install:
    name: Install / ${{ matrix.formula }}
    needs: validate
    if: needs.validate.result == 'success' && needs.validate.outputs.formulas != '[]'
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        formula: ${{ fromJson(needs.validate.outputs.formulas) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-tap
      - name: Install from source and test
        env:
          FORMULA: ${{ matrix.formula }}
        run: |
          brew install --build-from-source "$TAP/$FORMULA"
          brew test "$TAP/$FORMULA"

  bottle:
    name: Bottle / ${{ matrix.formula }}
    needs: [validate, install]
    if: needs.validate.result == 'success' && needs.validate.outputs.formulas != '[]'
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: write
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        formula: ${{ fromJson(needs.validate.outputs.formulas) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: ./.github/actions/setup-tap

      # setup-tap runs `brew update` which fetches from the tap's git remote.
      # Since the tap is symlinked to this workspace, that fetch can reset
      # our working tree to main's state (with the old bottle URLs).
      # Force the workspace back to the PR branch tip here.
      - name: Sync workspace to PR branch (after brew update)
        run: |
          git fetch origin "${{ github.head_ref }}"
          git reset --hard "origin/${{ github.head_ref }}"

      - name: Compute release metadata
        id: meta
        env:
          FORMULA: ${{ matrix.formula }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          version=$(brew info --json "$TAP/$FORMULA" | jq -r '.[0].versions.stable')
          tag="tap-pr-${PR_NUMBER}"
          root_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"
          echo "version=$version"   >> "$GITHUB_OUTPUT"
          echo "tag=$tag"           >> "$GITHUB_OUTPUT"
          echo "root_url=$root_url" >> "$GITHUB_OUTPUT"

      - name: Create prerelease (if absent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if ! gh release view "$TAG" &>/dev/null; then
            gh release create "$TAG" \
              --title "$TAG" \
              --prerelease \
              --notes "Pre-release snapshot — pending PR merge."
          fi

      - name: Build bottle
        env:
          FORMULA: ${{ matrix.formula }}
          ROOT_URL: ${{ steps.meta.outputs.root_url }}
        run: |
          brew install --build-bottle "$TAP/$FORMULA"
          brew bottle --json --root-url "$ROOT_URL" "$TAP/$FORMULA"

      - name: Merge bottle block and rename tarball
        uses: ./.github/actions/merge-bottle
        with:
          formula_name: ${{ matrix.formula }}
          version: ${{ steps.meta.outputs.version }}

      - name: Upload bottle to prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: gh release upload "$TAG" "$BOTTLE_FILE" --clobber

      - name: Commit bottle block to PR branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORMULA: ${{ matrix.formula }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add "Formula/${FORMULA}.rb"
          if ! git diff --cached --quiet; then
            git commit -m "bottles: ${FORMULA} v${VERSION} [skip ci]"
            git pull --rebase origin "${{ github.head_ref }}"
            git push origin "HEAD:${{ github.head_ref }}"
          fi

  smoke-test:
    name: Smoke Test / ${{ matrix.formula }}
    needs: [validate, bottle]
    if: needs.validate.result == 'success' && needs.validate.outputs.formulas != '[]'
    runs-on: macos-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        formula: ${{ fromJson(needs.validate.outputs.formulas) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: ./.github/actions/setup-tap

      # setup-tap runs `brew update` which can reset the workspace to main's
      # state. Force it back to the PR branch tip before installing.
      - name: Sync workspace to PR branch (after brew update)
        run: |
          git fetch origin "${{ github.head_ref }}"
          git reset --hard "origin/${{ github.head_ref }}"

      - name: Install from bottle and verify
        env:
          FORMULA: ${{ matrix.formula }}
        run: |
          brew install "$TAP/$FORMULA"
          brew info --json "$TAP/$FORMULA" \
            | jq -e '.[0].installed[0].poured_from_bottle == true' \
            || { echo "ERROR: $FORMULA was not poured from a bottle"; exit 1; }
          brew test "$TAP/$FORMULA"

  cleanup:
    name: Cleanup Prereleases
    if: github.event.action == 'closed' && !github.event.pull_request.merged
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/detect-formulas
        id: detect
        with:
          mode: pr
          base_ref: ${{ github.base_ref }}

      - name: Delete prerelease for abandoned PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORMULAS: ${{ steps.detect.outputs.formulas }}
        run: |
          set -euo pipefail
          # Derive the snapshot tag from the bottle block root_url written by CI.
          # All formulas in the PR share the same tap-pr-{N} tag, so we only
          # need to find it once.
          tag=""
          while IFS= read -r formula; do
            tag=$(grep -oP 'root_url.*releases/download/\K[^"]+' \
              "Formula/${formula}.rb" 2>/dev/null | head -1 || true)
            [ -n "$tag" ] && break
          done < <(echo "$FORMULAS" | jq -r '.[]')

          if [ -z "$tag" ]; then
            echo "No bottle block found in changed formulas — nothing to clean up."
            exit 0
          fi

          if ! gh release view "$tag" &>/dev/null; then
            echo "$tag: no release found, skipping."
            exit 0
          fi

          is_prerelease=$(gh release view "$tag" --json isPrerelease -q '.isPrerelease')
          if [ "$is_prerelease" = "true" ]; then
            gh release delete "$tag" --yes --cleanup-tag
            echo "Deleted prerelease $tag"
          else
            echo "$tag is already published — keeping."
          fi
