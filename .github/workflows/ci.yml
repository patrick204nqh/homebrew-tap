name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Run RuboCop
        run: bundle exec rubocop

  detect-formulas:
    name: Detect Formulas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      formulas: ${{ steps.detect.outputs.formulas }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect changed formulas
        id: detect
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD \
            | grep '^Formula/.*\.rb$' \
            | xargs -I{} basename {} .rb \
            | jq -R . | jq -sc .)

          if [ "$changed" = "[]" ] || [ "$changed" = "null" ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              changed=$(ls Formula/*.rb | xargs -I{} basename {} .rb | jq -R . | jq -sc .)
              echo "workflow_dispatch: building all formulas"
            else
              changed="[]"
              echo "No formula changes detected, skipping build"
            fi
          fi

          echo "formulas=$changed" >> $GITHUB_OUTPUT
          echo "Formulas to build: $changed"

  audit:
    name: Audit
    needs: detect-formulas
    # Skip audit when no formulas changed (e.g. workflow-only push)
    if: needs.detect-formulas.outputs.formulas != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up tap
        uses: ./.github/actions/setup-tap
      - name: Audit and style-check formulas
        run: |
          echo '${{ needs.detect-formulas.outputs.formulas }}' | jq -r '.[]' | while read -r name; do
            echo "--- $name ---"
            brew audit --strict "patrick204nqh/tap/$name"
            brew style "patrick204nqh/tap/$name"
          done

  build-and-publish:
    name: Build and Publish
    needs: [lint, audit, detect-formulas]
    # Bot commits carry [skip ci] so they never reach here; actor check is a secondary guard.
    if: github.actor != 'github-actions[bot]' && needs.detect-formulas.outputs.formulas != '[]'
    runs-on: macos-latest
    timeout-minutes: 30
    concurrency:
      group: bottle-publish-ci-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        formula: ${{ fromJson(needs.detect-formulas.outputs.formulas) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up tap
        uses: ./.github/actions/setup-tap

      - name: Install and test
        run: |
          brew install --build-bottle "patrick204nqh/tap/${{ matrix.formula }}"
          brew test "patrick204nqh/tap/${{ matrix.formula }}"

      - name: Build bottle
        run: |
          version=$(brew info --json "patrick204nqh/tap/${{ matrix.formula }}" | jq -r '.[0].versions.stable')
          echo "VERSION=$version" >> $GITHUB_ENV
          brew bottle --json \
            --root-url "https://github.com/patrick204nqh/homebrew-tap/releases/download/${{ matrix.formula }}-${version}" \
            "patrick204nqh/tap/${{ matrix.formula }}"

      - name: Merge bottle and commit
        uses: ./.github/actions/merge-bottle
        with:
          formula_name: ${{ matrix.formula }}
          version: ${{ env.VERSION }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ matrix.formula }}-${{ env.VERSION }}"
          if ! gh release view "$tag" &>/dev/null; then
            gh release create "$tag" \
              --title "${{ matrix.formula }} v${{ env.VERSION }}" \
              --notes "Pre-built bottles for \`${{ matrix.formula }}\` v${{ env.VERSION }}"
          fi
          gh release view "$tag" --json assets --jq '.assets[].name' \
            | grep '\.bottle' \
            | grep -v "^${{ env.BOTTLE_FILE }}$" \
            | xargs -I{} gh release delete-asset "$tag" {} --yes || true
          gh release upload "$tag" "${{ env.BOTTLE_FILE }}" --clobber

      - name: Delete stale releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current_tag="${{ matrix.formula }}-${{ env.VERSION }}"
          gh release list --limit 100 --json tagName \
            | jq -r '.[].tagName' \
            | grep "^${{ matrix.formula }}-" \
            | grep -v "^${current_tag}$" \
            | grep -v "^tap-" \
            | xargs -I{} sh -c 'gh release delete "$1" --yes --cleanup-tag || true' _ {}
