name: Build Ruby Runtime

# ─── PURPOSE ────────────────────────────────────────────────────────────────
# Builds a self-contained, relocatable Ruby binary and publishes it as a
# GitHub release artifact.  All Ruby-based tap formulas reference this runtime
# instead of depending on Homebrew's `ruby` formula, which would drag in `llvm`
# and force users to compile from source on any non-standard Homebrew prefix.
#
# ─── WHEN TO RUN ────────────────────────────────────────────────────────────
# • Once on initial tap setup (no ruby-runtime release exists yet).
# • When upgrading the bundled Ruby version (e.g. security/bug-fix patch).
#   Frequency: infrequent — typically once or twice per year.
#
# ─── NOT NEEDED WHEN ────────────────────────────────────────────────────────
# • A formula's own version bumps (ci.yml / snapshot.yml handle those).
# • Adding a new formula — it reuses the existing runtime release.
#
# ─── AFTER RUNNING ──────────────────────────────────────────────────────────
# The workflow automatically opens a PR updating the sha256 in every formula
# that references ruby-runtime.  Review and merge the PR — the push to main
# triggers build-bottles, which rebuilds and publishes bottles.
# ────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      ruby_version:
        description: "Ruby version to build (e.g. 3.3.6)"
        required: true
        default: "3.3.6"

jobs:
  build:
    name: Build arm64
    runs-on: macos-latest   # macos-latest is arm64 (M-series)
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    env:
      RUBY_VERSION: ${{ inputs.ruby_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          echo "$RUBY_VERSION" \
            | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "ERROR: ruby_version must be in X.Y.Z format"; exit 1; }

      - name: Install ruby-build
        run: brew install ruby-build

      - name: Build Ruby ${{ inputs.ruby_version }}
        env:
          RUBY_CONFIGURE_OPTS: --enable-load-relative
        run: |
          set -euo pipefail
          ruby-build "$RUBY_VERSION" "$(pwd)/ruby-runtime"
          echo "Built: $("$(pwd)/ruby-runtime/bin/ruby" -e 'puts RUBY_VERSION')"

      - name: Make runtime relocatable
        run: |
          set -euo pipefail
          INSTALL_DIR="$(pwd)/ruby-runtime"
          ruby="$INSTALL_DIR/bin/ruby"

          # 1. Patch rbconfig.rb so prefix/sitedir/vendordir resolve via __dir__
          rbconfig=$("$ruby" -e "require 'rbconfig'; puts \$LOADED_FEATURES.grep(/rbconfig\\.rb$/).last")
          orig_prefix=$("$ruby" -e "puts RbConfig::CONFIG['prefix']")
          ruby .github/scripts/patch-rbconfig.rb "$rbconfig" "$orig_prefix"

          # 2. Fix the dylib load path permanently (survives any extraction path)
          old_dylib=$(otool -L "$ruby" | awk '/libruby\.[0-9]+\.[0-9]+\.dylib/ {print $1}')
          lib_name=$(basename "$old_dylib")
          install_name_tool -change "$old_dylib" "@loader_path/../lib/${lib_name}" "$ruby"

          # 3. Set a portable shebang placeholder in all wrapper scripts.
          #    Homebrew formulas call relocate-runtime.rb to finalise to the
          #    Cellar path after staging.
          find "$INSTALL_DIR/bin" -maxdepth 1 -type f | while IFS= read -r f; do
            head -c 2 "$f" | grep -q '^#!' || continue
            sed -i '' '1s|^#!.*|#!/usr/bin/env ruby|' "$f"
          done

          # 4. Bundle the relocation script so formulas need no inline logic
          cp .github/scripts/relocate-runtime.rb "$INSTALL_DIR/relocate-runtime.rb"
          chmod +x "$INSTALL_DIR/relocate-runtime.rb"

      - name: Strip and archive
        run: |
          set -euo pipefail
          INSTALL_DIR="$(pwd)/ruby-runtime"

          rm -rf "$INSTALL_DIR/share/doc" "$INSTALL_DIR/share/man"
          find "$INSTALL_DIR" -name "*.o" -delete

          TARBALL="ruby-runtime-${RUBY_VERSION}-arm64-darwin.tar.gz"
          tar -czf "$TARBALL" -C "$(dirname "$INSTALL_DIR")" "$(basename "$INSTALL_DIR")"

          SHA=$(shasum -a 256 "$TARBALL" | awk '{print $1}')
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"
          echo "SHA=$SHA" >> "$GITHUB_ENV"

          echo "### Ruby runtime ${RUBY_VERSION} (arm64)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "sha256 \"${SHA}\"" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="ruby-runtime-${RUBY_VERSION}"

          # Discover which formulas reference this runtime — no hardcoding needed.
          consumers=$(grep -rl 'resource "ruby-runtime"' Formula/*.rb \
            | xargs -I{} basename {} .rb \
            | paste -sd',' \
            | sed 's/,/, /g') || consumers=""

          if ! gh release view "$TAG" &>/dev/null; then
            gh release create "$TAG" \
              --title "Ruby runtime ${RUBY_VERSION}" \
              --notes "Relocatable Ruby ${RUBY_VERSION} (arm64). Used by: ${consumers}."
          fi

          gh release upload "$TAG" "$TARBALL" --clobber

      - name: Open PR to update formula sha256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="update/ruby-runtime-${RUBY_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git pull --rebase origin main

          git checkout -B "$BRANCH"

          ruby .github/scripts/update-runtime-sha.rb "$SHA" Formula/*.rb

          git add Formula/
          if git diff --cached --quiet; then
            echo "sha256 already up to date — no PR needed."
            exit 0
          fi

          git commit -m "fix: update ruby-runtime sha256 for ${RUBY_VERSION}"
          git push --force origin "$BRANCH"

          existing=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR #${existing} already open — branch updated."
          else
            gh pr create \
              --title "fix: update ruby-runtime sha256 for ${RUBY_VERSION}" \
              --body "$(printf 'Automated update from [build-ruby-runtime run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).\n\n```\nsha256 \"%s\"\n```' "$SHA")" \
              --base main \
              --head "$BRANCH"
          fi
