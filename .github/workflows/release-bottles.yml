name: Release Bottles

# ─── PURPOSE ────────────────────────────────────────────────────────────────
# Reusable workflow: given a list of formula names and a snapshot tag, builds
# bottles, publishes them to a tap-YYYY-MM-DD GitHub Release, and smoke-tests
# the install path a real user would take.
#
# Called by build-bottles.yml (push to main) and sync-formulas.yml (weekly).
# ────────────────────────────────────────────────────────────────────────────
on:
  workflow_call:
    inputs:
      formulas:
        description: 'JSON array of formula names, e.g. ["browserctl","sumologic-query"]'
        type: string
        required: true
      snapshot_tag:
        description: 'Snapshot release tag, e.g. tap-2026-04-23'
        type: string
        required: true
    secrets:
      gh_token:
        required: true

env:
  TAP: patrick204nqh/tap

jobs:
  prepare:
    name: Prepare Snapshot Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.gh_token }}
          SNAPSHOT_TAG: ${{ inputs.snapshot_tag }}
        run: |
          if gh release view "$SNAPSHOT_TAG" &>/dev/null; then
            echo "Release $SNAPSHOT_TAG already exists."
            exit 0
          fi
          gh release create "$SNAPSHOT_TAG" \
            --title "$SNAPSHOT_TAG" \
            --prerelease \
            --draft \
            --notes "Building..."

  build:
    name: Build / ${{ matrix.formula }}
    needs: prepare
    runs-on: macos-latest
    timeout-minutes: 45
    concurrency:
      group: bottle-publish-${{ inputs.snapshot_tag }}
      cancel-in-progress: false
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        formula: ${{ fromJson(inputs.formulas) }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-tap

      - name: Install for bottling
        env:
          FORMULA: ${{ matrix.formula }}
        run: |
          brew install --build-bottle "$TAP/$FORMULA"
          brew test "$TAP/$FORMULA"

      - name: Build bottle
        env:
          FORMULA: ${{ matrix.formula }}
          SNAPSHOT_TAG: ${{ inputs.snapshot_tag }}
        run: |
          version=$(brew info --json "$TAP/$FORMULA" | jq -r '.[0].versions.stable')
          echo "VERSION=$version" >> "$GITHUB_ENV"
          brew bottle --json \
            --root-url "https://github.com/patrick204nqh/homebrew-tap/releases/download/$SNAPSHOT_TAG" \
            "$TAP/$FORMULA"

      - name: Merge bottle
        uses: ./.github/actions/merge-bottle
        with:
          formula_name: ${{ matrix.formula }}
          version: ${{ env.VERSION }}
          gh_token: ${{ secrets.gh_token }}

      - name: Upload bottle to snapshot release
        env:
          GH_TOKEN: ${{ secrets.gh_token }}
          SNAPSHOT_TAG: ${{ inputs.snapshot_tag }}
        run: |
          gh release upload "$SNAPSHOT_TAG" "$BOTTLE_FILE" --clobber

  finalize:
    name: Finalize Snapshot
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Collect formula versions
        id: versions
        run: |
          notes=""
          for formula in Formula/*.rb; do
            name=$(basename "$formula" .rb)
            version=$(grep -oP '(?:archive/refs/tags/v|releases/download/v)\K[0-9]+\.[0-9]+\.[0-9]+' "$formula" | head -1)
            if [ -z "$version" ]; then
              version=$(grep -oP '^\s+version\s+"\K[^"]+' "$formula" | head -1)
            fi
            version="${version:-unknown}"
            notes="${notes}- \`${name}\` v${version}"$'\n'
          done
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish snapshot release
        env:
          GH_TOKEN: ${{ secrets.gh_token }}
          SNAPSHOT_TAG: ${{ inputs.snapshot_tag }}
          SNAPSHOT_NOTES: ${{ steps.versions.outputs.notes }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          body=$(printf '## Formula versions\n\n%s\n---\n*Triggered by: %s.*' "$SNAPSHOT_NOTES" "$EVENT_NAME")
          gh release edit "$SNAPSHOT_TAG" \
            --notes "$body" \
            --draft=false \
            --prerelease=false

  smoke-test:
    name: Smoke Test / ${{ matrix.formula }}
    needs: finalize
    if: needs.finalize.result == 'success'
    runs-on: macos-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        formula: ${{ fromJson(inputs.formulas) }}
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@675fcd27b59e54d310c5484c8c27c01d03da660c

      - name: Install from bottle and test
        env:
          FORMULA: ${{ matrix.formula }}
        run: |
          brew tap patrick204nqh/tap
          brew install "patrick204nqh/tap/$FORMULA"
          brew info --json "patrick204nqh/tap/$FORMULA" \
            | jq -e '.[0].installed[0].poured_from_bottle == true' \
            || { echo "ERROR: $FORMULA was not installed from a bottle"; exit 1; }
          brew test "patrick204nqh/tap/$FORMULA"
