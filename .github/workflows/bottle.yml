name: Bottle

# Bot-authored steps: build the bottle, upload it to a prerelease, commit
# the bottle block back to the PR branch, and smoke-test installation from
# the uploaded bottle. Runs only when a Formula/* file changes.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths: ['Formula/**']

env:
  TAP: patrick204nqh/tap

# Bot commits back to the PR branch retrigger this workflow. Cancel the tail
# of the previous run so old and new build jobs don't race.
concurrency:
  group: bottle-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect Formulas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      formulas: ${{ steps.detect.outputs.formulas }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/detect-formulas
        id: detect
        with:
          mode: pr
          base_ref: ${{ github.base_ref }}

  build:
    name: Build / ${{ matrix.formula }}
    needs: detect
    if: needs.detect.outputs.formulas != '[]'
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: write
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        formula: ${{ fromJson(needs.detect.outputs.formulas) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      # The bottle-commit step pushes back to the PR branch with an app token,
      # which retriggers this workflow. On the second run the bottle block is
      # already current, so short-circuit here before paying for setup-tap
      # (~12s Homebrew install) or metadata.
      - name: Check if bottle already current
        id: check
        env:
          FORMULA: ${{ matrix.formula }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          expected_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/tap-pr-${PR_NUMBER}"
          if grep -qF "root_url \"${expected_url}\"" "Formula/${FORMULA}.rb"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Bottle block already matches ${expected_url} — skipping build."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/setup-tap
        if: steps.check.outputs.skip != 'true'

      # setup-tap runs `brew update` which fetches from the tap's git remote.
      # Since the tap is symlinked to this workspace, that fetch can reset
      # our working tree to main's state (with the old bottle URLs).
      # Force the workspace back to the PR branch tip here.
      - name: Sync workspace to PR branch (after brew update)
        if: steps.check.outputs.skip != 'true'
        run: |
          git fetch origin "${{ github.head_ref }}"
          git reset --hard "origin/${{ github.head_ref }}"

      - name: Compute release metadata
        id: meta
        if: steps.check.outputs.skip != 'true'
        env:
          FORMULA: ${{ matrix.formula }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          version=$(brew info --json "$TAP/$FORMULA" | jq -r '.[0].versions.stable')
          tag="tap-pr-${PR_NUMBER}"
          root_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"
          echo "version=$version"   >> "$GITHUB_OUTPUT"
          echo "tag=$tag"           >> "$GITHUB_OUTPUT"
          echo "root_url=$root_url" >> "$GITHUB_OUTPUT"

      - name: Create prerelease (if absent)
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if ! gh release view "$TAG" &>/dev/null; then
            gh release create "$TAG" \
              --title "$TAG" \
              --prerelease \
              --notes "Pre-release snapshot — pending PR merge."
          fi

      - name: Build bottle
        if: steps.check.outputs.skip != 'true'
        env:
          FORMULA: ${{ matrix.formula }}
          ROOT_URL: ${{ steps.meta.outputs.root_url }}
        run: |
          brew install --build-bottle "$TAP/$FORMULA"
          brew bottle --json --root-url "$ROOT_URL" "$TAP/$FORMULA"

      - name: Merge bottle block and rename tarball
        if: steps.check.outputs.skip != 'true'
        uses: ./.github/actions/merge-bottle
        with:
          formula_name: ${{ matrix.formula }}
          version: ${{ steps.meta.outputs.version }}

      - name: Upload bottle to prerelease
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: gh release upload "$TAG" "$BOTTLE_FILE" --clobber

      # App token push retriggers this workflow on the new SHA so required
      # checks land on the bot commit. GITHUB_TOKEN pushes don't trigger
      # workflows, which is why we can't just use it here.
      - name: Generate app token
        if: steps.check.outputs.skip != 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Commit bottle block to PR branch
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          FORMULA: ${{ matrix.formula }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add "Formula/${FORMULA}.rb"
          if ! git diff --cached --quiet; then
            git commit -m "bottles: ${FORMULA} v${VERSION}"
            git pull --rebase origin "${{ github.head_ref }}"
            git push origin "HEAD:${{ github.head_ref }}"
          fi

  smoke:
    name: Smoke Test / ${{ matrix.formula }}
    needs: [detect, build]
    if: needs.detect.outputs.formulas != '[]'
    runs-on: macos-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        formula: ${{ fromJson(needs.detect.outputs.formulas) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: ./.github/actions/setup-tap

      # setup-tap runs `brew update` which can reset the workspace to main's
      # state. Force it back to the PR branch tip before installing.
      - name: Sync workspace to PR branch (after brew update)
        run: |
          git fetch origin "${{ github.head_ref }}"
          git reset --hard "origin/${{ github.head_ref }}"

      - name: Install from bottle and verify
        env:
          FORMULA: ${{ matrix.formula }}
        run: |
          brew install "$TAP/$FORMULA"
          brew info --json "$TAP/$FORMULA" \
            | jq -e '.[0].installed[0].poured_from_bottle == true' \
            || { echo "ERROR: $FORMULA was not poured from a bottle"; exit 1; }
          brew test "$TAP/$FORMULA"
