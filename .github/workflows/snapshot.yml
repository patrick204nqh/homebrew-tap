name: Snapshot

on:
  schedule:
    # Sunday 23:00 UTC — captures end-of-week state before Monday's update check.
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  detect:
    name: Detect Updates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      updates: ${{ steps.check.outputs.updates }}
      snapshot_tag: ${{ steps.tag.outputs.snapshot_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute snapshot tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            tag="tap-$(date -u +%Y-%m-%d)"
          else
            tag="tap-$(date -u +%Y-%m-%dT%H-%M)"
          fi
          echo "snapshot_tag=$tag" >> $GITHUB_OUTPUT

      - name: Collect formula targets
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          updates='[]'

          for formula in Formula/*.rb; do
            formula_name=$(basename "$formula" .rb)
            echo "Checking $formula_name..."

            current_version=$(grep -oP '(?:archive/refs/tags/v|releases/download/v)\K[0-9]+\.[0-9]+\.[0-9]+' "$formula" | head -1)
            if [ -z "$current_version" ]; then
              current_version=$(grep -oP '^\s+version\s+"\K[^"]+' "$formula" | head -1)
            fi

            repo_url=$(grep -oP '(?<=github\.com/)[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+' "$formula" | head -1)

            if [ -z "$current_version" ] || [ -z "$repo_url" ]; then
              echo "  Could not extract version or repo, skipping."
              continue
            fi

            latest_release=$(curl -sf -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$repo_url/releases/latest" || true)
            latest_version=$(echo "$latest_release" | jq -r '.tag_name // empty' | sed 's/^v//')

            if [ "$latest_version" = "null" ] || [ -z "$latest_version" ]; then
              echo "  No upstream release found, skipping."
              continue
            fi

            echo "  current=$current_version  latest=$latest_version"

            # schedule: skip formulas already at latest.
            # workflow_dispatch: always include — enforce latest for full rebuild.
            if [ "${{ github.event_name }}" = "schedule" ] && [ "$current_version" = "$latest_version" ]; then
              echo "  Up to date, skipping."
              continue
            fi

            entry=$(jq -n \
              --arg name "$formula_name" \
              --arg repo "$repo_url" \
              --arg current "$current_version" \
              --arg latest "$latest_version" \
              '{name: $name, repo: $repo, current: $current, latest: $latest}')
            updates=$(echo "$updates" | jq --argjson e "$entry" '. += [$e]')
            echo "  Queued."
          done

          {
            echo "updates<<EOF"
            echo "$updates"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "Total queued: $(echo "$updates" | jq length)"

  create-release:
    name: Create Snapshot Release
    needs: detect
    if: needs.detect.outputs.updates != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create snapshot release (draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          snapshot_tag="${{ needs.detect.outputs.snapshot_tag }}"

          if gh release view "$snapshot_tag" &>/dev/null; then
            echo "Release $snapshot_tag already exists, skipping creation."
            exit 0
          fi

          gh release create "$snapshot_tag" \
            --title "$snapshot_tag" \
            --prerelease \
            --draft \
            --notes "Building..."

  update-and-build:
    name: Update and Build / ${{ matrix.formula.name }}
    needs: [detect, create-release]
    if: needs.detect.outputs.updates != '[]'
    runs-on: macos-latest
    timeout-minutes: 45
    concurrency:
      group: bottle-publish-snapshot-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        formula: ${{ fromJson(needs.detect.outputs.updates) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up tap
        uses: ./.github/actions/setup-tap

      - name: Update formula
        # Skip when current == latest (manual dispatch on an already-up-to-date formula).
        # Still installs and bottles below — just doesn't modify the formula file.
        if: matrix.formula.current != matrix.formula.latest
        run: |
          formula_name="${{ matrix.formula.name }}"
          latest_version="${{ matrix.formula.latest }}"

          current_url=$(grep -oP 'url\s+"\K[^"]+' "Formula/${formula_name}.rb" | head -1)
          current_version_in_url=$(echo "$current_url" | grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          tarball_url=$(echo "$current_url" | sed "s/${current_version_in_url}/${latest_version}/g")

          if [ -z "$tarball_url" ]; then
            echo "ERROR: could not derive tarball URL for $formula_name"
            exit 1
          fi

          echo "Downloading: $tarball_url"
          curl -fSL "$tarball_url" -o tarball.tar.gz
          sha256=$(sha256sum tarball.tar.gz | cut -d' ' -f1)
          rm -f tarball.tar.gz

          .github/scripts/update-formula.sh \
            "Formula/${formula_name}.rb" \
            "$latest_version" \
            "$sha256" \
            "${{ matrix.formula.repo }}"

          git diff "Formula/${formula_name}.rb"

      - name: Install and test
        run: |
          brew install --build-bottle "patrick204nqh/tap/${{ matrix.formula.name }}"
          brew test "patrick204nqh/tap/${{ matrix.formula.name }}"

      - name: Build bottle
        run: |
          version=$(brew info --json "patrick204nqh/tap/${{ matrix.formula.name }}" | jq -r '.[0].versions.stable')
          echo "VERSION=$version" >> $GITHUB_ENV
          brew bottle --json \
            --root-url "https://github.com/patrick204nqh/homebrew-tap/releases/download/${{ needs.detect.outputs.snapshot_tag }}" \
            "patrick204nqh/tap/${{ matrix.formula.name }}"

      - name: Merge bottle and commit
        uses: ./.github/actions/merge-bottle
        with:
          formula_name: ${{ matrix.formula.name }}
          version: ${{ env.VERSION }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload bottle to snapshot release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.detect.outputs.snapshot_tag }}" \
            "${{ env.BOTTLE_FILE }}" --clobber

  tag-snapshot:
    name: Finalize Snapshot
    needs: [detect, create-release, update-and-build]
    if: always() && needs.detect.result == 'success' && needs.create-release.result == 'success' && needs.update-and-build.result != 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Collect formula versions
        id: versions
        run: |
          notes=""
          for formula in Formula/*.rb; do
            name=$(basename "$formula" .rb)
            version=$(grep -oP '(?:archive/refs/tags/v|releases/download/v)\K[0-9]+\.[0-9]+\.[0-9]+' "$formula" | head -1)
            if [ -z "$version" ]; then
              version=$(grep -oP '^\s+version\s+"\K[^"]+' "$formula" | head -1)
            fi
            version="${version:-unknown}"
            notes="${notes}- \`${name}\` v${version}"$'\n'
          done
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Publish snapshot release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SNAPSHOT_NOTES: ${{ steps.versions.outputs.notes }}
        run: |
          snapshot_tag="${{ needs.detect.outputs.snapshot_tag }}"
          trigger="${{ github.event_name }}"

          if [ "$trigger" = "schedule" ]; then
            title="Weekly snapshot ${snapshot_tag}"
          else
            title="Snapshot ${snapshot_tag}"
          fi

          body=$(printf '## Formula versions\n\n%s\n---\n*Triggered by: %s.*' "$SNAPSHOT_NOTES" "$trigger")

          gh release edit "$snapshot_tag" \
            --title "$title" \
            --notes "$body" \
            --draft=false \
            --prerelease=false \
            --latest
