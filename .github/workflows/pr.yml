name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Run RuboCop
        run: bundle exec rubocop

  detect-formulas:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
      all: ${{ steps.detect.outputs.all }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed formulas
        id: detect
        run: |
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^Formula/.*\.rb$' \
            | xargs -I{} basename {} .rb \
            | jq -R . | jq -sc .)
          [ "$changed" = "[]" ] && changed="null"

          all=$(ls Formula/*.rb | xargs -I{} basename {} .rb | jq -R . | jq -sc .)

          echo "changed=$changed" >> $GITHUB_OUTPUT
          echo "all=$all" >> $GITHUB_OUTPUT
          echo "Changed formulas: $changed"

  audit:
    needs: detect-formulas
    if: needs.detect-formulas.outputs.changed != 'null'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
      - name: Audit and style-check changed formulas
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/patrick204nqh"
          ln -sfn "$GITHUB_WORKSPACE" "$(brew --repository)/Library/Taps/patrick204nqh/homebrew-tap"
          echo '${{ needs.detect-formulas.outputs.changed }}' | jq -r '.[]' | while read -r name; do
            echo "--- $name ---"
            brew audit --strict "patrick204nqh/tap/$name"
            brew style "patrick204nqh/tap/$name"
          done

  install:
    needs: [lint, audit, detect-formulas]
    if: needs.detect-formulas.outputs.changed != 'null'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        formula: ${{ fromJson(needs.detect-formulas.outputs.changed) }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
      - name: Tap local repo
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/patrick204nqh"
          ln -sfn "$GITHUB_WORKSPACE" "$(brew --repository)/Library/Taps/patrick204nqh/homebrew-tap"
      - name: Install and test
        run: |
          brew install "patrick204nqh/tap/${{ matrix.formula }}"
          brew test "patrick204nqh/tap/${{ matrix.formula }}"
