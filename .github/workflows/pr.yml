name: Validate PR

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Lint
        run: bundle exec rubocop

  detect-formulas:
    name: Detect Formulas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed formulas
        id: detect
        run: |
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^Formula/.*\.rb$' \
            | xargs -I{} basename {} .rb \
            | jq -R . | jq -sc .)
          [ "$changed" = "[]" ] && changed="null"

          echo "changed=$changed" >> $GITHUB_OUTPUT
          echo "Changed formulas: $changed"

  audit:
    name: Audit
    needs: detect-formulas
    if: needs.detect-formulas.outputs.changed != 'null'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up tap
        uses: ./.github/actions/setup-tap
      - name: Audit and style-check changed formulas
        run: |
          echo '${{ needs.detect-formulas.outputs.changed }}' | jq -r '.[]' | while read -r name; do
            echo "--- $name ---"
            brew audit --strict "patrick204nqh/tap/$name"
            brew style "patrick204nqh/tap/$name"
          done

  install:
    name: Install
    needs: [lint, audit, detect-formulas]
    if: needs.detect-formulas.outputs.changed != 'null'
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        formula: ${{ fromJson(needs.detect-formulas.outputs.changed) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up tap
        uses: ./.github/actions/setup-tap

      - name: Install and test
        run: |
          brew install "patrick204nqh/tap/${{ matrix.formula }}"
          brew test "patrick204nqh/tap/${{ matrix.formula }}"
