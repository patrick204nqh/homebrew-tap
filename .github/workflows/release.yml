name: Release

# ─── PURPOSE ────────────────────────────────────────────────────────────────
# Triggered when a PR merges into main and touches Formula/*.
# Publishes the prerelease bottle that was built and verified during PR CI,
# rewrites its description, and prunes stale tap-pr-* releases whose bottles
# are no longer referenced by any formula.
# ────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths: ['Formula/**']
  workflow_dispatch:

env:
  TAP: patrick204nqh/tap

jobs:
  detect:
    name: Detect Changed Formulas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      formulas: ${{ steps.detect.outputs.formulas }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: ./.github/actions/detect-formulas
        id: detect
        with:
          mode: push

  publish:
    name: Publish / ${{ matrix.formula }}
    needs: detect
    if: needs.detect.outputs.formulas != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        formula: ${{ fromJson(needs.detect.outputs.formulas) }}
    steps:
      - uses: actions/checkout@v4

      - name: Publish and describe release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORMULA: ${{ matrix.formula }}
        run: |
          set -euo pipefail

          tag=$(grep -oP 'root_url.*releases/download/\K[^"]+' \
            "Formula/${FORMULA}.rb" 2>/dev/null | head -1 || true)

          if [ -z "$tag" ]; then
            echo "No bottle block in Formula/${FORMULA}.rb — skipping (direct push without PR CI?)."
            exit 0
          fi

          if ! gh release view "$tag" &>/dev/null; then
            echo "No release found for $tag — skipping."
            exit 0
          fi

          # Extract version
          version=$(grep -oP '^\s+version\s+"\K[^"]+' "Formula/${FORMULA}.rb" | head -1 || true)
          if [ -z "$version" ]; then
            version=$(grep -oP '(?:archive/refs/tags/v|releases/download/v)\K[0-9]+\.[0-9]+\.[0-9]+' \
              "Formula/${FORMULA}.rb" | head -1)
          fi

          # Extract PR number from tag (tap-pr-N)
          pr_number=$(echo "$tag" | grep -oP '(?<=tap-pr-)\d+' || true)

          # Compose release body
          if [ -n "$pr_number" ]; then
            pr_ref="merged via [PR #${pr_number}](https://github.com/${GITHUB_REPOSITORY}/pull/${pr_number})"
          else
            pr_ref="deployed to \`main\`"
          fi

          body="Bottles for \`${FORMULA}\` v${version} — built and verified by CI, ${pr_ref}."

          is_prerelease=$(gh release view "$tag" --json isPrerelease -q '.isPrerelease')
          if [ "$is_prerelease" = "true" ]; then
            gh release edit "$tag" \
              --prerelease=false \
              --title "$tag" \
              --notes "$body"
            echo "Published $tag"
          else
            echo "$tag is already published — refreshing description."
            gh release edit "$tag" \
              --title "$tag" \
              --notes "$body"
          fi

      # NOTE: PR 1 of 3 in the tap-pr-N → {formula}-v{version} migration.
      # This step is intentionally LOG-ONLY for now so we can observe what it
      # would do without taking destructive action while old and new schemes
      # coexist. PR 3 removes this step entirely (replaced by the per-formula
      # retention sweep below, which will also become active in PR 3).
      - name: Prune stale tap-pr releases (LOG-ONLY)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Collect every tap-pr tag currently referenced by a formula
          referenced=$(grep -rhoP 'root_url.*releases/download/\K[^"]+' Formula/ \
            | grep '^tap-pr-' | sort -u || true)

          # Identify published tap-pr-* releases not referenced by any formula.
          gh release list --limit 100 --json tagName,isPrerelease \
            -q '.[] | select(.tagName | test("^tap-pr-")) | select(.isPrerelease == false) | .tagName' \
          | while read -r stale_tag; do
              if echo "$referenced" | grep -qx "$stale_tag"; then
                echo "$stale_tag still referenced — keeping."
              else
                echo "DRY-RUN would delete: $stale_tag"
              fi
            done

      # NOTE: PR 1 of 3 — new retention sweep added in LOG-ONLY mode.
      # For each formula, list its published {formula}-v* releases, sort by
      # publishedAt desc, keep the 5 most recent, log the rest as would-prune.
      # PR 3 flips this step to active deletion.
      - name: Retention sweep (LOG-ONLY)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          KEEP=5
          for rb in Formula/*.rb; do
            [ -e "$rb" ] || continue
            formula=$(basename "$rb" .rb)
            echo "=== Retention sweep for ${formula} (keep ${KEEP}) ==="

            # Fetch published per-formula releases, newest first.
            tags=$(gh release list --limit 1000 \
              --json tagName,isPrerelease,publishedAt \
              -q ".[] | select(.tagName | startswith(\"${formula}-v\")) | select(.isPrerelease == false) | [.publishedAt, .tagName] | @tsv" \
              | sort -r \
              | awk -F'\t' '{print $2}')

            if [ -z "$tags" ]; then
              echo "  no published releases for ${formula} — nothing to sweep."
              continue
            fi

            i=0
            while IFS= read -r tag; do
              i=$((i + 1))
              if [ "$i" -le "$KEEP" ]; then
                echo "  keep[$i]: $tag"
              else
                echo "  DRY-RUN would prune: $tag"
              fi
            done <<< "$tags"
          done
