name: Build Bottles

on:
  push:
    branches: [main]
    paths:
      - 'Formula/**'
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    uses: ./.github/workflows/validate-formulas.yml
    with:
      mode: push

  prepare:
    name: Prepare
    needs: validate
    if: github.actor != 'github-actions[bot]' && needs.validate.outputs.formulas != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      snapshot_tag: ${{ steps.tag.outputs.snapshot_tag }}
    steps:
      - name: Compute snapshot tag
        id: tag
        run: echo "snapshot_tag=tap-$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

  release:
    name: Release
    needs: [validate, prepare]
    if: github.actor != 'github-actions[bot]' && needs.validate.outputs.formulas != '[]'
    uses: ./.github/workflows/release-bottles.yml
    with:
      formulas: ${{ needs.validate.outputs.formulas }}
      snapshot_tag: ${{ needs.prepare.outputs.snapshot_tag }}
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
