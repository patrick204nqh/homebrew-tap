name: Validate

# Human-authored checks: lint the Ruby sources, detect which formulas
# changed, audit them. Never writes anything to the repo.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  TAP: patrick204nqh/tap
  RUBY_VERSION: "3.4"

concurrency:
  group: validate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
      - run: bundle exec rubocop

  detect:
    name: Detect Formulas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      formulas: ${{ steps.detect.outputs.formulas }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/detect-formulas
        id: detect
        with:
          mode: pr
          base_ref: ${{ github.base_ref }}

  audit:
    name: Audit
    needs: detect
    if: needs.detect.outputs.formulas != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-tap
      - name: Audit and style-check formulas
        env:
          FORMULAS: ${{ needs.detect.outputs.formulas }}
        run: |
          set -euo pipefail
          echo "$FORMULAS" | jq -r '.[]' | while read -r name; do
            echo "--- $name ---"
            brew audit --strict "$TAP/$name"
            brew style "$TAP/$name"
          done
