name: Validate

# Human-authored checks: lint the Ruby sources, detect which formulas
# changed, audit them. Never writes anything to the repo.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  TAP: patrick204nqh/tap
  RUBY_VERSION: "3.4"

concurrency:
  group: validate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
      - run: bundle exec rubocop

  detect:
    name: Detect Formulas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      formulas: ${{ steps.detect.outputs.formulas }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/detect-formulas
        id: detect
        with:
          mode: pr
          base_ref: ${{ github.base_ref }}

  audit:
    # Always runs (no job-level `if:`) so the check reports SUCCESS on every
    # PR, including workflow-only changes with no formula diff. Prevents the
    # "some checks were not successful" SKIPPED marker in the merge box.
    name: Audit
    needs: detect
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Gate
        id: gate
        env:
          FORMULAS: ${{ needs.detect.outputs.formulas }}
        run: |
          if [ "$FORMULAS" = "[]" ]; then
            echo "No formula changes — nothing to audit."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'
      - uses: ./.github/actions/setup-tap
        if: steps.gate.outputs.run == 'true'
      - name: Audit and style-check formulas
        if: steps.gate.outputs.run == 'true'
        env:
          FORMULAS: ${{ needs.detect.outputs.formulas }}
        run: |
          set -euo pipefail
          echo "$FORMULAS" | jq -r '.[]' | while read -r name; do
            echo "--- $name ---"
            brew audit --strict "$TAP/$name"
            brew style "$TAP/$name"
          done
