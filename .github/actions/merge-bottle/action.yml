name: Merge Bottle
description: Merges brew bottle JSON into the formula and renames the tarball.

inputs:
  formula_name:
    required: true
    description: Homebrew formula name
  version:
    required: true
    description: Formula version string

runs:
  using: composite
  steps:
    - name: Merge bottle block and rename tarball
      shell: bash
      run: |
        set -euo pipefail
        brew bottle --merge --write --no-commit *.bottle*.json

        formula_name="${{ inputs.formula_name }}"
        version="${{ inputs.version }}"
        rebuild=$(grep -E '^\s+rebuild [0-9]+' "Formula/${formula_name}.rb" | grep -oE '[0-9]+' || echo "0")
        old_bottle=$(ls *.bottle*.tar.gz | head -1)
        os=$(echo "$old_bottle" | sed -E 's/.*\.([^.]+)\.bottle.*/\1/')
        if [ "$rebuild" = "0" ]; then
          new_bottle="${formula_name}-${version}.${os}.bottle.tar.gz"
        else
          new_bottle="${formula_name}-${version}.${os}.bottle.${rebuild}.tar.gz"
        fi
        [ "$old_bottle" != "$new_bottle" ] && mv "$old_bottle" "$new_bottle"
        echo "BOTTLE_FILE=$new_bottle" >> "$GITHUB_ENV"
